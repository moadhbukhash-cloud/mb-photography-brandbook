<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Moadh Bukhash Trading</title>
<meta name="description" content="Official website of Moadh Bukhash Trading. Coming soon." />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --ink: #0A0A0A;
    --paper: #FAFAF7;
    --grey-70: #ABAAA5;
    --grey-55: #807F7B;
    --grey-85: #D6D5D0;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    text-align: center;
  }

  .wordmark {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--grey-55);
    margin-bottom: 28px;
  }

  h1 {
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 18px;
  }

  p.lead {
    font-size: 16px;
    color: var(--grey-55);
    max-width: 420px;
    margin: 0 0 56px;
    line-height: 1.6;
  }

  p.lead a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--grey-85);
  }

  .rule {
    width: 48px;
    height: 1px;
    background: var(--grey-85);
    margin-bottom: 28px;
  }

  footer {
    font-size: 12px;
    color: var(--grey-70);
    line-height: 1.9;
  }

  footer .legal {
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--grey-55);
    font-weight: 500;
  }
</style>
</head>
<body>

  <div class="wordmark">Moadh Bukhash</div>
  <h1>Coming soon.</h1>
  <p class="lead">Something new is being built here. In the meantime, reach us at <a href="mailto:moadh@moadh.com">moadh@moadh.com</a>.</p>

  <div class="rule"></div>

  <footer>
    <div class="legal">Moadh Bukhash Trading</div>
    <div>&copy; 2026 &middot; All rights reserved</div>
  </footer>

</body>
</html>
